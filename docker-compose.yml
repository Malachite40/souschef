services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: souschef
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d souschef"]
      interval: 5s
      timeout: 5s
      retries: 5

  scraper:
    build: ./apps/scraper
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_BETTER_AUTH_URL=${NEXT_PUBLIC_BETTER_AUTH_URL}
    ports:
      - "3020:3020"
    env_file: .env
    environment:
      - HOSTNAME=0.0.0.0
    depends_on:
      db:
        condition: service_healthy
      scraper:
        condition: service_started

volumes:
  pgdata:
